# Streamlit app configuration (safe to commit — no secrets here).

[theme]
base = "dark"
primaryColor = "#4da6ff"

[server]
headless = true
# Disable the module file-watcher. It tries to introspect every installed
# package (including transformers' optional torchvision-only image models),
# which floods startup with harmless ModuleNotFoundError tracebacks.
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[logger]
level = "error"
